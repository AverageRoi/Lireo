<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Music</title>

    <script src="./music.js" defer></script>

    <style>
        :root {
            --dot-size: 20px;
            --orange-1: #ff8c00;
            --orange-2: #ff8000;
            --orange-3: #ff7000;
            --pink: #ffdede;
            --card-background: black;
            --card-radius: 14px;
            --muted: #c6c6c6;
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: black;
        }

        body {
            position: relative;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        .background-effect {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;

            background: conic-gradient(
                from 180deg at 50% 70%,
                hsla(0, 0%, 98%, 1) 0deg,
                #eec32d 72deg,
                #ec4b4b 144deg,
                #709ab9 216deg,
                #4dffbf 288deg,
                hsla(0, 0%, 98%, 1) 360deg
            );

            mask:
                radial-gradient(
                    circle at 50% 50%,
                    white 2px,
                    transparent 2.5px
                )
                50% 50% / var(--dot-size) var(--dot-size),

                url("https://assets.codepen.io/605876/noise-mask.png")
                256px 50% / 256px 256px;

            mask-composite: intersect;

            -webkit-mask:
                radial-gradient(
                    circle at 50% 50%,
                    white 2px,
                    transparent 2.5px
                )
                50% 50% / var(--dot-size) var(--dot-size),

                url("https://assets.codepen.io/605876/noise-mask.png")
                256px 50% / 256px 256px;

            -webkit-mask-composite: source-in;

            animation: flicker 20s infinite linear;
        }

        @keyframes flicker {
            to {
                mask-position: 50% 50%, 0 50%;
                -webkit-mask-position: 50% 50%, 0 50%;
            }
        }

        .return-link {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 20;
        }

        .return-link a {
            display: inline-flex;
            border-radius: 10px;
            text-decoration: none;
        }

        .return-icon {
            display: block;
            width: 55px;
            height: 55px;

            background: linear-gradient(
                90deg,
                var(--orange-1),
                var(--orange-2),
                var(--orange-3)
            );

            -webkit-mask:
                url("/SVG/return-icon.svg")
                center / contain
                no-repeat;

            mask:
                url("/SVG/return-icon.svg")
                center / contain
                no-repeat;

            transition:
                transform 0.2s ease,
                background 0.2s ease;
        }

        .return-link a:hover .return-icon,
        .return-link a:focus-visible .return-icon {
            transform: scale(1.08);
            background: var(--pink);
        }

        .page-content {
            position: relative;
            z-index: 1;
            width: min(1200px, calc(100% - 48px));
            margin: 0 auto;
            padding: 30px 0 80px;
        }

        .page-title {
            margin: 0 0 70px;
            text-align: center;

            color: transparent;
            background: linear-gradient(
                90deg,
                var(--orange-1),
                var(--orange-2),
                var(--orange-3)
            );

            background-clip: text;
            -webkit-background-clip: text;

            font-size: clamp(3rem, 5vw, 5.5rem);
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(
                auto-fit,
                minmax(min(100%, 330px), 1fr)
            );
            gap: 32px;
            align-items: stretch;
        }

        .music-card {
            display: flex;
            flex-direction: column;
            min-height: 560px;
            overflow: hidden;

            border: 3px solid transparent;
            border-radius: var(--card-radius);

            background:
                linear-gradient(
                    var(--card-background),
                    var(--card-background)
                )
                padding-box,

                linear-gradient(
                    135deg,
                    var(--orange-1),
                    var(--orange-2),
                    var(--orange-3)
                )
                border-box;
        }

        .music-media {
            display: grid;
            width: 100%;
            height: 220px;
            place-items: center;
            overflow: hidden;
            background: black;
            border-bottom: 1px solid orange;
        }

        .music-image {
            display: block;
            width: 100%;
            height: auto;
        }

        .music-card:nth-child(1) .music-image {
            transform: translateY(-260px);
        }

        .music-initials {
            color: transparent;
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .music-content {
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 24px;
        }

        .music-type {
            margin: 0 0 10px;
            color: var(--orange-2);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .music-title {
            margin: 0 0 14px;
            color: white;
            font-size: 1.8rem;
            font-weight: 650;
            line-height: 1.15;
        }

        .music-description {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .track-list {
            display: grid;
            gap: 10px;
            margin: 22px 0 0;
            padding: 0;
            list-style: none;
        }

        .track-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: baseline;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .track-title {
            color: white;
            font-size: 0.95rem;
            line-height: 1.35;
        }

        .track-duration {
            color: var(--muted);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .listen-area {
            display: grid;
            gap: 14px;
            margin-top: auto;
            padding-top: 26px;
        }

        .listen-link {
            width: fit-content;
            color: var(--orange-1);
            font-size: 0.95rem;
            text-decoration: none;
        }

        .listen-link:hover,
        .listen-link:focus-visible {
            color: var(--pink);
        }

        .music-player,
        .music-embed {
            display: block;
            width: 100%;
            border-radius: 8px;
        }

        .music-player {
            accent-color: var(--orange-2);
        }

        .music-embed {
            height: 260px;
            border: 0;
        }

        @media (max-width: 700px) {
            .return-link {
                top: 20px;
                left: 20px;
            }

            .return-icon {
                width: 44px;
                height: 44px;
            }

            .page-content {
                width: min(100% - 28px, 1200px);
                padding-top: 100px;
            }

            .page-title {
                margin-bottom: 42px;
                font-size: clamp(2.4rem, 12vw, 4rem);
                line-height: 1.05;
            }

            .music-grid {
                gap: 24px;
            }

            .music-card {
                min-height: auto;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .background-effect {
                animation: none;
            }

            .music-card,
            .return-icon {
                transition: none;
            }

            .music-card:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="background-effect" aria-hidden="true"></div>

    <nav class="return-link" aria-label="Return">
        <a href="/" aria-label="Return to the home page">
            <span class="return-icon" aria-hidden="true"></span>
        </a>
    </nav>

    <main class="page-content">
        <h1 class="page-title">Here is my music</h1>

        <section
            class="music-grid"
            id="music-grid"
            aria-label="Music projects"
        ></section>
    </main>
</body>
</html>
