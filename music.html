<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
</head>
<style>
        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background: black;
}
        h1 {
            margin: 40px;
            left: 0;
            text-align: center;

            color: transparent;
            background: linear-gradient(
            90deg,
            #ff8c00,
            #ff8000,
            #ff7000
            );

            background-clip: text;
            -webkit-background-clip: text;

            font-family: Arial, sans-serif;
            font-size: clamp(3rem, 4vw, 9rem);
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        h2 {
            margin: 70px;
            left: 0;
            text-align: center;

            color: white;

            font-family: Arial, sans-serif;
            font-size: 50px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .return-link {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 10;
        }
        .return-link a {
            display:inline-flex;
            text-decoration: none;
        }
        .return-link:hover {
            color: #ffdede
        }
        .return-icon {
            display: block;
            width: 55px;
            height: 55px;

            background: linear-gradient(
            90deg,
            #ff8c00,
            #ff8000,
            #ff7000
            );

            -webkit-mask: url("/SVG/return-icon.svg")
            center / contain
            no-repeat;

            mask:
            url("/SVG/return-icon.svg")
            center / contain
            no-repeat;

            transition:
            transform 0.2s ease,
            filter 0.2s ease;
        }
        .return-link a:hover .return-icon,
        .return-link a:focus-visible .return-icon {
          transform: scale(1.05);
          background: #ffdede;
        }
        .music-container {
            width: min(900px, calc(100% - 40px));
            height: 300px;
            margin: 10px auto;
        }

        .music-container iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 12px;
        }
        .forever-destined {
            font-size: 10px;
            color: #cccccc;
            line-break: anywhere;
            word-break: normal;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;
            font-weight: 100;
        }
        [data-us-project] {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            will-change: transform;
            transform: translateZ(0);
            pointer-events: none !important;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            contain: layout style paint;
            isolation: isolate;
        }
        
        [data-us-project] * {
            pointer-events: none !important;
        }
</style>
<body>

    <div data-us-project="p7Ff6pfTrb5Gs59C7nLC"></div>

    <script type="text/javascript">
        !function(){if(!window.UnicornStudio){window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js",i.onload=function(){window.UnicornStudio.isInitialized||(UnicornStudio.init(),window.UnicornStudio.isInitialized=!0)},(document.head || document.body).appendChild(i)}}();
    </script>

    <h1>
        Here is my music collection
    </h1>

        <nav class="return-link" aria-label="Return">

            <a href="/"
             rel="noopener noreferrer"
             aria-label="Return"
            >
        <span class="return-icon" aria-hidden="true"></span>    
        </a>
        </nav>

        <h2>Forever Destined</h2>
        <main class="music-container">
        <iframe 
            scrolling="no"
            frameborder="no"
            allow="autoplay; encrypted-media" 
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/soundcloud%253Aplaylists%253A1968417444&color=%23643494&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
        </iframe>
        <div class="forever-destined">
        <a href="https://soundcloud.com/lireomusic" title="Lireo" target="_blank" style="color: #cccccc; text-decoration: none;">Lireo</a> · <a href="https://soundcloud.com/lireomusic/sets/forever-destined" title="Forever Destined" target="_blank" style="color: #cccccc; text-decoration: none;">Forever Destined</a></div>
        </main>
</body>
</html>
