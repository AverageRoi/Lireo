<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
</head>
<style>
        body {
          overflow: hidden;
          background: black;
        }
        h1 {
            margin: 40px;
            left: 0;
            text-align: center;

            color: transparent;
            background: linear-gradient(
            90deg,
            #ff8c00,
            #ff8000,
            #ff7000
            );

            background-clip: text;
            -webkit-background-clip: text;

            font-family: Arial, sans-serif;
            font-size: clamp(3rem, 4vw, 9rem);
            font-weight: 700;
            letter-spacing: 0.08em;
        }
</style>
<body>
    <h1>
        Here is my music collection
    </h1>
</body>
</html>
