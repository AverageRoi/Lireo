<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code</title>
</head>
<style>
        body {
            position: relative;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background: black;
        }
        h1 {
            margin: 40px;
            left: 0;
            text-align: center;

            color: transparent;
            background: linear-gradient(
            90deg,
            #ff8c00,
            #ff8000,
            #ff7000
            );

            background-clip: text;
            -webkit-background-clip: text;

            font-family: Arial, sans-serif;
            font-size: clamp(3rem, 4vw, 9rem);
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .return-link {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 10;
        }
        .return-link a {
            display:inline-flex;
            text-decoration: none;
        }
        .return-link:hover {
            color: #ffdede
        }
        .return-icon {
            display: block;
            width: 55px;
            height: 55px;

            background: linear-gradient(
            90deg,
            #ff8c00,
            #ff8000,
            #ff7000
            );

            -webkit-mask: url("return-icon.svg")
            center / contain
            no-repeat;

            mask:
            url("return-icon.svg")
            center / contain
            no-repeat;

            transition:
            transform 0.2s ease,
            filter 0.2s ease;
        }
        .return-link a:hover .return-icon,
        .return-link a:focus-visible .return-icon {
          transform: scale(1.05);
          background: #ffdede;
        }
        @font-face {
            font-family: "Geist";
            src: url("https://assets.codepen.io/605876/GeistVF.ttf") format("truetype");
        }

        * {
            box-sizing: border-box;
        }
        :root {
            --size: 20px;
        }
        .el {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: conic-gradient(from 180deg at 50% 70%,hsla(0,0%,98%,1) 0deg,#eec32d 72.0000010728836deg,#ec4b4b 144.0000021457672deg,#709ab9 216.00000858306885deg,#4dffbf 288.0000042915344deg,hsla(0,0%,98%,1) 1turn);
            width: 100%;
            height: 100%;
            mask:
                radial-gradient(circle at 50% 50%, white 2px, transparent 2.5px) 50% 50% / var(--size) var(--size),
                url("https://assets.codepen.io/605876/noise-mask.png") 256px 50% / 256px 256px;
            mask-composite: intersect;
                -webkit-mask:
        radial-gradient(
            circle at 50% 50%,
            white 2px,
            transparent 2.5px
        ) 50% 50% / var(--size) var(--size),
        url("https://assets.codepen.io/605876/noise-mask.png")
        256px 50% / 256px 256px;

                -webkit-mask-composite: source-in;

                animation: flicker 20s infinite linear;
        }

        h2 {
            position: absolute;
            top: 5%;
            left: 17%;

            margin: 0;
            font-size: 34px;
            font-family:Arial, sans-serif;
            font-weight: 140;
            color: white;
        }
        @keyframes flicker {
            to {
                mask-position: 50% 50%, 0 50%;
                -webkit-mask-position: 50% 50%, 0 50%;
            }
        }
        .blocks {
            position: absolute;
            width: 350px;
            height: 400px;
            z-index: 15;

            border: 3px solid transparent;
            border-radius: 12px;

            background:
                linear-gradient(black, black) padding-box,
                linear-gradient(
                    90deg,
                    #ff8c00,
                    #ff8000,
                    #ff7000
                ) border-box;
        }
        .avenue-guard {
            top: 45%;
            left: 38%;
            transform: translate(-50%, -50%);
        }
        .avenue-guard-image {
            
        }
</style>
<body>
    <div class="el">
    </div>
    <h1>
        Here are my projects
    </h1>

        <nav class="return-link" aria-label="Return">

            <a href="/"
             rel="noopener noreferrer"
             aria-label="Return"
            >
        <span class="return-icon" aria-hidden="true"></span>    
        </a>
        </nav>
        <div class="blocks avenue-guard">
            <h2>Avenue Guard</h2>
        </div>

    </div>
</body>
</html>
